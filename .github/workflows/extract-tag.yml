name: Extract Old Version

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 20230609
        required: true

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Test token authentication
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_TOKEN }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
        run: |
          # 测试 token 是否能访问目标仓库
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            -H "Authorization: token ${TARGET_TOKEN}" \
            https://api.github.com/repos/${TARGET_REPO}
          
          # 测试 git 操作
          git ls-remote https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_REPO}.git

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}
          fetch-depth: 0

      - name: Push to target repo
        env:
          TARGET_TOKEN: ${{ secrets.TARGET_TOKEN }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
        run: |
          git push --force https://x-access-token:${TARGET_TOKEN}@github.com/${TARGET_REPO}.git HEAD:main
